<svg width="256" height="256" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Gitable Logo</title>

  <!--
    Chat-first composition: a speech bubble (hero) holds a git branch whose
    arm grows into a 3-leaf sprig. The bubble + git branch are the standard
    glyphs; the right git node was removed and the leaves rebuilt as solid
    coral shapes for orientation/spacing control.
  -->

  <!-- 1. Standard glyph: speech / chat bubble (hero, filled navy) -->
  <g transform="translate(11.5 12.5) scale(1.3) translate(-14.5 -15.5)">
    <path
      d="M14.5 10.2C11.57 10.2 9.2 12.57 9.2 15.5C9.2 18.43 11.57 20.8 14.5 20.8H20.75C20.75 20.8 19.62 19.68 19.15 17.85C19.56 17.14 19.8 16.34 19.8 15.5C19.8 12.57 17.43 10.2 14.5 10.2Z"
      fill="#09244B"
    />
  </g>

  <!-- 2. Standard glyph: git branch (coral) — right node removed, arm capped -->
  <g transform="translate(11 12.5) scale(0.46) translate(-12 -12)">
    <path
      d="M3,6C3,4.34315 4.34315,3 6,3C7.65685,3 9,4.34315 9,6C9,7.30622 8.16519,8.41746 7,8.82929L7,11.5351C7.58835,11.1948 8.27143,11 9,11L15,11C16.1046,11 17,10.1046 17,9L17,8.82929C17,7.7 19,7.7 19,9C19,11.2091 17.2091,13 15,13L9,13C7.89543,13 7,13.8954 7,15L7,15.1707C8.16519,15.5825 9,16.6938 9,18C9,19.6569 7.65685,21 6,21C4.34315,21 3,19.6569 3,18C3,16.6938 3.83481,15.5825 5,15.1707L5,8.82929C3.83481,8.41746 3,7.30622 3,6Z"
      fill="#F98B9E"
    />
  </g>

  <!-- 3. Three-leaf sprig (solid coral), upward fan with a small gap above the arm -->
  <g transform="translate(13.85 10.8)" fill="#F98B9E">
    <path transform="rotate(-18) translate(0 -0.45)" d="M0,0 C0.85,-1.05 0.85,-2.1 0,-3 C-0.85,-2.1 -0.85,-1.05 0,0 Z"/>
    <path transform="rotate(18) translate(0 -0.45)" d="M0,0 C0.85,-1.05 0.85,-2.1 0,-3 C-0.85,-2.1 -0.85,-1.05 0,0 Z"/>
    <path transform="rotate(54) translate(0 -0.45)" d="M0,0 C0.85,-1.05 0.85,-2.1 0,-3 C-0.85,-2.1 -0.85,-1.05 0,0 Z"/>
  </g>
</svg>
