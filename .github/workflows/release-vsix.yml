name: Release VSIX

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix, e.g. 1.2.3 or 1.2.3-beta.1"
        required: true
        default: "0.0.0-dev"

permissions:
  contents: write

concurrency:
  group: release-vsix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  package-vsix:
    name: Test and package VSIX
    runs-on: ubuntu-latest
    needs: prepare
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply tag version to package metadata
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Run Git integration tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package --out "gitable-${VERSION}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitable-${{ env.VERSION }}-vsix
          path: gitable-${{ env.VERSION }}.vsix
          if-no-files-found: error

      - name: Attach VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${VERSION}"
          VSIX="gitable-${VERSION}.vsix"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$VSIX" --clobber
          else
            RELEASE_ARGS=()
            if [[ "$VERSION" == *-* ]]; then
              RELEASE_ARGS+=(--prerelease)
            fi
            gh release create "$TAG" "$VSIX" \
              --title "$TAG" \
              --notes "Gitable $TAG" \
              "${RELEASE_ARGS[@]}"
          fi

      - name: Publish to VS Code Marketplace
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        run: |
          PUBLISH_ARGS=(--packagePath "gitable-${VERSION}.vsix" --pat "$AZURE_DEVOPS_PAT")
          if [[ "$VERSION" == *-* ]]; then
            PUBLISH_ARGS+=(--pre-release)
          fi
          npx vsce publish "${PUBLISH_ARGS[@]}"
